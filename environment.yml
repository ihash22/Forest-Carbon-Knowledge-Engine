name: carbon_llm_prod
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      # PDF Parsing
      - pymupdf==1.24.1
      # Modern LangChain Ecosystem
      - langchain
      - langchain-core
      - langchain-community
      - langchain-openai
      - langchain-text-splitters
      # Vector DB & LLM Client
      - chromadb
      - openai
      # LLMOps & Evaluation (🚨 NEWLY ADDED)
      - mlflow
      - evidently==0.7.21
      # Standard Data Science tools
      - pandas
      - python-dotenv
      - jupyter